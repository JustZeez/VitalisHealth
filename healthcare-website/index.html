<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Standard Favicon -->
    <link rel="icon" type="image/png" href="/images/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>VitalisHealth | Modern Healthcare for Modern Lives</title>
    <meta name="description" content="Experience compassionate healthcare powered by modern technology and expert doctors." />

    <!-- 1. Open Graph / Facebook / LinkedIn / WhatsApp -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://your-website-url.com/" />
    <meta property="og:title" content="VitalisHealth | Modern Healthcare" />
    <meta property="og:description" content="Quality medical care at your fingertips. Book your appointment today." />
    <!-- This is the image that shows in the preview -->
    <meta property="og:image" content="/images/logo.png" />

    <!-- 2. Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://your-website-url.com/" />
    <meta property="twitter:title" content="VitalisHealth | Modern Healthcare" />
    <meta property="twitter:description" content="Quality medical care at your fingertips. Book your appointment today." />
    <meta property="twitter:image" content="/images/logo.png" />

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
